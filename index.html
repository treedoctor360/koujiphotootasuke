<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="工事写真カメラ">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>工事写真カメラ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{height:100%;width:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,"Hiragino Sans","Helvetica Neue",sans-serif;font-size:14px;}

/* ===== 縦向き警告（横向きを促す） ===== */
#orient-warn{
  position:fixed;inset:0;background:#000;z-index:9000;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  padding:40px;text-align:center;
}
.orient-icon{font-size:64px;animation:rot 2s ease-in-out infinite;}
@keyframes rot{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-90deg);}}
#orient-warn h2{font-size:18px;font-weight:600;}
#orient-warn p{font-size:13px;color:#9ca3af;line-height:1.6;}
/* 縦向きで警告表示・横向きで撮影画面 */
@media (orientation:portrait){
  #orient-warn{display:flex;}
  #app{display:none;}
}
@media (orientation:landscape){
  #orient-warn{display:none;}
  #app{display:block;}
}

/* ===== アプリ本体 ===== */
#app{position:fixed;inset:0;background:#000;}

#video{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  background:#000;
}
#cv-snap{display:none;}

/* ===== カメラ未起動オーバーレイ ===== */
.start-screen{
  position:absolute;inset:0;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  padding:30px;
}
.start-screen.hidden{display:none;}
.start-screen h1{font-size:22px;font-weight:600;letter-spacing:1px;}
.start-screen .sub{font-size:12px;color:#9ca3af;letter-spacing:0.5px;}
.btn-start{
  margin-top:10px;padding:14px 40px;
  background:#fff;color:#000;border:none;border-radius:30px;
  font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
  box-shadow:0 4px 16px rgba(255,255,255,0.15);
}
.btn-start:active{transform:scale(0.96);}
.start-note{font-size:10px;color:#525252;margin-top:8px;}

/* ===== HUD（上部・中央寄せの小さなインジケーター） ===== */
.hud{
  position:absolute;top:env(safe-area-inset-top,12px);left:50%;transform:translateX(-50%);
  display:flex;gap:6px;
  padding:6px 8px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:20px;
  z-index:10;
  font-size:11px;
}
.hud-item{
  display:flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:14px;
}
.hud-item .dot{width:6px;height:6px;border-radius:50%;background:#10b981;transition:background 0.2s;}
.hud-item .dot.warn{background:#f59e0b;}
.hud-item .dot.bad{background:#ef4444;}
.hud-item .lbl{color:#d4d4d8;font-size:10px;letter-spacing:0.3px;}
.hud-item .val{color:#fff;font-weight:600;font-variant-numeric:tabular-nums;}

/* ===== 構図ガイド（iPhoneカメラ風グリッド） ===== */
.grid-overlay{position:absolute;inset:0;pointer-events:none;}
.grid-overlay .gline{position:absolute;background:rgba(255,255,255,0.3);}
.grid-overlay .gline.v1{left:33.33%;top:0;bottom:0;width:0.5px;}
.grid-overlay .gline.v2{left:66.66%;top:0;bottom:0;width:0.5px;}
.grid-overlay .gline.h1{top:33.33%;left:0;right:0;height:0.5px;}
.grid-overlay .gline.h2{top:66.66%;left:0;right:0;height:0.5px;}

/* ===== 水準器（中央水平線） ===== */
.level{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:160px;height:30px;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.level-center{
  position:absolute;width:24px;height:1px;background:rgba(255,255,255,0.5);
}
.level-bar{
  width:120px;height:2px;background:#fbbf24;
  border-radius:1px;transform-origin:center;
  transition:background 0.15s;
  box-shadow:0 0 8px rgba(251,191,36,0.4);
}
.level-bar.ok{background:#fbbf24;}  /* デフォルト＝黄色（iPhone風） */
.level-bar.locked{background:#fbbf24;height:1px;width:200px;}  /* 水平になったら細く長く */
.level-bar.bad{background:#fbbf24;}

/* ===== 右側操作エリア（横向き時の親指側） ===== */
.right-panel{
  position:absolute;right:env(safe-area-inset-right,0);top:0;bottom:0;
  width:110px;
  background:linear-gradient(to left,rgba(0,0,0,0.5),transparent);
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:20px 0;
  z-index:10;
}

/* ギャラリーへの小窓（左上） */
.gallery-thumb{
  width:46px;height:46px;border-radius:8px;
  background:#1f2937;border:1px solid rgba(255,255,255,0.3);
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#6b7280;font-size:18px;position:relative;
}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;}
.gallery-thumb .badge{
  position:absolute;top:-4px;right:-4px;
  background:#ef4444;color:#fff;font-size:9px;font-weight:bold;
  border-radius:10px;padding:1px 5px;min-width:18px;text-align:center;
}

/* シャッター */
.shutter{
  width:72px;height:72px;border-radius:50%;
  background:transparent;border:4px solid #fff;
  cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.shutter::before{
  content:'';width:58px;height:58px;border-radius:50%;background:#fff;
  transition:transform 0.1s, background 0.15s;
}
.shutter:active::before{transform:scale(0.88);}
.shutter.flash::before{background:#ef4444;}

/* カメラ切替 */
.switch-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(60,60,60,0.7);border:none;color:#fff;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.switch-btn:active{transform:scale(0.92);}

/* ===== 警告バナー（下部中央） ===== */
.warn-banner{
  position:absolute;bottom:env(safe-area-inset-bottom,16px);left:50%;transform:translateX(-50%);
  background:rgba(239,68,68,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;padding:6px 14px;border-radius:16px;
  font-size:11px;font-weight:500;letter-spacing:0.3px;
  display:none;max-width:60%;text-align:center;z-index:10;
}
.warn-banner.show{display:block;}
.warn-banner.amber{background:rgba(245,158,11,0.85);}

/* ===== 撮影フラッシュ ===== */
.shot-flash{
  position:absolute;inset:0;background:#fff;
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity 0.08s;
}
.shot-flash.active{opacity:0.9;transition:opacity 0.02s;}

/* ===== ギャラリービュー（フルスクリーン） ===== */
#gallery-view{
  position:absolute;inset:0;background:#000;z-index:50;
  display:none;flex-direction:column;
}
#gallery-view.open{display:flex;}
.gv-head{
  padding:env(safe-area-inset-top,12px) env(safe-area-inset-right,16px) 12px env(safe-area-inset-left,16px);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #1f2937;
}
.gv-head h2{font-size:15px;font-weight:600;}
.gv-close{
  background:none;border:none;color:#fff;font-size:22px;cursor:pointer;
  padding:6px 10px;
}
.gv-body{
  flex:1;overflow-y:auto;
  padding:12px env(safe-area-inset-right,12px) 12px env(safe-area-inset-left,12px);
  -webkit-overflow-scrolling:touch;
}
.gv-empty{text-align:center;padding:40px 20px;color:#6b7280;font-size:12px;}
.gv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.gv-card{background:#111827;border-radius:10px;overflow:hidden;border:1px solid #1f2937;}
.gv-card-img{width:100%;height:110px;object-fit:cover;display:block;cursor:pointer;background:#000;}
.gv-card-body{padding:6px 8px;font-size:10px;}
.gv-card-meta{color:#9ca3af;margin-bottom:4px;font-size:9px;}
.gv-q{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.qchip{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;}
.qchip.ok{background:rgba(16,185,129,0.2);color:#6ee7b7;}
.qchip.warn{background:rgba(245,158,11,0.2);color:#fcd34d;}
.qchip.bad{background:rgba(239,68,68,0.2);color:#fca5a5;}
.gv-btns{display:flex;gap:4px;}
.gbtn{flex:1;padding:5px 0;background:#1f2937;color:#e5e7eb;border:none;border-radius:5px;font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;}
.gbtn.dl{background:#2563eb;}
.gbtn.del{background:#7f1d1d;}

/* ライトボックス */
.lb{position:fixed;inset:0;background:#000;z-index:9500;display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:100vw;max-height:100vh;object-fit:contain;}
.lb-close{position:absolute;top:env(safe-area-inset-top,16px);right:env(safe-area-inset-right,16px);background:rgba(255,255,255,0.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;}

/* トースト */
#toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;
  display:none;
}
#toast.show{display:block;animation:tf 1.8s forwards;}
@keyframes tf{0%{opacity:0;}15%,80%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>

<div id="toast"></div>

<!-- 縦持ち時の警告 -->
<div id="orient-warn">
  <div class="orient-icon">📱</div>
  <h2>横向きにしてください</h2>
  <p>工事写真は横向きで撮影します。<br>端末を横に回転してください。</p>
</div>

<!-- アプリ本体（横向きのみ表示） -->
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="cv-snap"></canvas>

  <!-- 起動前画面 -->
  <div class="start-screen" id="start-screen">
    <h1>📷 工事写真カメラ</h1>
    <div class="sub">v0.2 / 撮影品質リアルタイム判定</div>
    <button class="btn-start" onclick="startCamera()">カメラを起動</button>
    <div class="start-note">カメラへのアクセス許可が必要です</div>
  </div>

  <!-- 撮影中UI（起動後表示） -->
  <div id="cam-ui" style="display:none;">
    <div class="grid-overlay">
      <div class="gline v1"></div><div class="gline v2"></div>
      <div class="gline h1"></div><div class="gline h2"></div>
    </div>

    <div class="level">
      <div class="level-center" style="left:calc(50% - 80px);"></div>
      <div class="level-center" style="right:calc(50% - 80px);"></div>
      <div class="level-bar" id="level-bar"></div>
    </div>

    <div class="hud">
      <div class="hud-item"><div class="dot" id="dot-tilt"></div><span class="lbl">傾</span><span class="val" id="val-tilt">0°</span></div>
      <div class="hud-item"><div class="dot" id="dot-blur"></div><span class="lbl">ピ</span><span class="val" id="val-blur">--</span></div>
      <div class="hud-item"><div class="dot" id="dot-exp"></div><span class="lbl">明</span><span class="val" id="val-exp">--</span></div>
    </div>

    <div class="warn-banner" id="warn"></div>

    <div class="right-panel">
      <div class="gallery-thumb" id="gthumb" onclick="openGallery()">
        <span id="gthumb-icon">🖼️</span>
        <span class="badge" id="gthumb-badge" style="display:none;">0</span>
      </div>
      <button class="shutter" id="shutter" onclick="capture()"></button>
      <button class="switch-btn" onclick="switchCamera()">🔄</button>
    </div>

    <div class="shot-flash" id="shot-flash"></div>
  </div>

  <!-- ギャラリービュー -->
  <div id="gallery-view">
    <div class="gv-head">
      <h2>ギャラリー</h2>
      <button class="gv-close" onclick="closeGallery()">✕</button>
    </div>
    <div class="gv-body">
      <div class="gv-empty" id="gv-empty">まだ撮影された写真はありません</div>
      <div class="gv-grid" id="gv-grid"></div>
    </div>
  </div>

  <!-- ライトボックス -->
  <div class="lb" id="lb" onclick="closeLB()">
    <button class="lb-close" onclick="event.stopPropagation();closeLB()">✕</button>
    <img id="lb-img" src="" alt="">
  </div>
</div>

<script>
'use strict';

// ============================================================
// IndexedDB
// ============================================================
var DB_NAME='KoujiCameraPocV01', DB_VER=1;
var ST_PHOTOS='photos';
var db=null;

function openDB(cb){
  var req=indexedDB.open(DB_NAME,DB_VER);
  req.onupgradeneeded=function(e){
    var d=e.target.result;
    if(!d.objectStoreNames.contains(ST_PHOTOS)) d.createObjectStore(ST_PHOTOS,{keyPath:'id'});
  };
  req.onsuccess=function(e){db=e.target.result;cb&&cb();};
  req.onerror=function(){alert('IndexedDBが使えません');};
}
function dbPut(rec,cb){var tx=db.transaction(ST_PHOTOS,'readwrite');tx.objectStore(ST_PHOTOS).put(rec);tx.oncomplete=function(){cb&&cb();};}
function dbAll(cb){var out=[];var req=db.transaction(ST_PHOTOS,'readonly').objectStore(ST_PHOTOS).openCursor();req.onsuccess=function(e){var c=e.target.result;if(c){out.push(c.value);c.continue();}else cb&&cb(out);};}
function dbDel(id,cb){var tx=db.transaction(ST_PHOTOS,'readwrite');tx.objectStore(ST_PHOTOS).delete(id);tx.oncomplete=function(){cb&&cb();};}

// ============================================================
// 状態
// ============================================================
var stream=null, facingMode='environment';
var currentTilt=0, currentBlur=0, currentExp=128;
var analyzeTimer=null;
var photos=[];

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.remove('show');void el.offsetWidth;el.classList.add('show');}

// ============================================================
// カメラ起動
// ============================================================
function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert('このブラウザはカメラ機能に対応していません');return;}
  var constraints={video:{facingMode:{ideal:facingMode},width:{ideal:1920},height:{ideal:1080}},audio:false};
  navigator.mediaDevices.getUserMedia(constraints).then(function(s){
    stream=s;
    document.getElementById('video').srcObject=s;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('cam-ui').style.display='block';
    requestTiltPermission();
    startAnalyze();
  }).catch(function(err){
    console.error(err);
    alert('カメラを起動できませんでした：'+err.message);
  });
}
function switchCamera(){if(stream){stream.getTracks().forEach(function(t){t.stop();});}facingMode=(facingMode==='environment')?'user':'environment';startCamera();}

// ============================================================
// 傾きセンサー
// ============================================================
function requestTiltPermission(){
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(r){if(r==='granted') window.addEventListener('deviceorientation',onTilt);}).catch(function(){});
  } else {
    window.addEventListener('deviceorientation',onTilt);
  }
}
// 横向き時：beta（前後傾き）が水平基準になる
function onTilt(e){
  // 横向き持ちの場合、betaが水平方向の傾きを表す
  if(e.beta===null) return;
  // -90を0として正規化（横向き時の基準）
  var t = e.beta - 90;
  // ±180を超えないように
  if(t > 90) t = t - 180;
  if(t < -90) t = t + 180;
  currentTilt=Math.round(t*10)/10;
  updateTiltUI();
}
function updateTiltUI(){
  var bar=document.getElementById('level-bar');
  var dot=document.getElementById('dot-tilt');
  var val=document.getElementById('val-tilt');
  var abs=Math.abs(currentTilt);
  bar.style.transform='rotate('+(currentTilt)+'deg)';
  val.textContent=currentTilt.toFixed(1)+'°';
  bar.classList.remove('ok','locked','bad');
  dot.classList.remove('warn','bad');
  if(abs<=1){bar.classList.add('locked');}  // 1°以内＝水平確定（細く長く）
  else if(abs<=5){bar.classList.add('ok');dot.classList.add('warn');}
  else{bar.classList.add('bad');dot.classList.add('bad');}
}

// ============================================================
// 画像解析（ピンボケ・明るさ）
// ============================================================
function startAnalyze(){if(analyzeTimer)clearInterval(analyzeTimer);analyzeTimer=setInterval(analyzeFrame,400);}
function analyzeFrame(){
  var v=document.getElementById('video');
  if(!v.videoWidth) return;
  var W=200, H=Math.round(200*v.videoHeight/v.videoWidth);
  var c=document.createElement('canvas'); c.width=W; c.height=H;
  var ctx=c.getContext('2d'); ctx.drawImage(v,0,0,W,H);
  var img=ctx.getImageData(0,0,W,H), data=img.data;
  var sumLuma=0, n=W*H, gray=new Float32Array(n);
  for(var i=0,p=0;i<data.length;i+=4,p++){
    var y=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    gray[p]=y; sumLuma+=y;
  }
  currentExp=sumLuma/n;
  var lapSumSq=0, lapSum=0, lapCount=0;
  for(var y2=1;y2<H-1;y2++){
    for(var x=1;x<W-1;x++){
      var idx=y2*W+x;
      var lap=-4*gray[idx]+gray[idx-1]+gray[idx+1]+gray[idx-W]+gray[idx+W];
      lapSum+=lap; lapSumSq+=lap*lap; lapCount++;
    }
  }
  var lapMean=lapSum/lapCount;
  currentBlur=lapSumSq/lapCount - lapMean*lapMean;
  updateQualityUI();
}
function qualBlur(v){if(v>150)return'ok';if(v>50)return'warn';return'bad';}
function qualExp(v){if(v>=60&&v<=200)return'ok';if(v>=40&&v<=220)return'warn';return'bad';}
function qualTilt(v){var a=Math.abs(v);if(a<=2)return'ok';if(a<=5)return'warn';return'bad';}
function setHud(key,state,val){
  var dot=document.getElementById('dot-'+key);
  var v=document.getElementById('val-'+key);
  dot.classList.remove('warn','bad');
  if(state==='warn') dot.classList.add('warn');
  else if(state==='bad') dot.classList.add('bad');
  v.textContent=val;
}
function updateQualityUI(){
  var blurState=qualBlur(currentBlur);
  var expState=qualExp(currentExp);
  setHud('blur',blurState,(currentBlur<1000?currentBlur.toFixed(0):Math.round(currentBlur)));
  setHud('exp',expState,Math.round(currentExp));
  var warn=document.getElementById('warn');
  var msgs=[];
  if(Math.abs(currentTilt)>5) msgs.push('傾き'+currentTilt.toFixed(1)+'°');
  if(blurState==='bad') msgs.push('ピントが甘い');
  if(expState==='bad') msgs.push(currentExp<60?'暗すぎ':'明るすぎ');
  if(msgs.length){
    warn.textContent='⚠ '+msgs.join(' / ');
    warn.classList.add('show');
    warn.classList.toggle('amber',msgs.length===1);
  } else { warn.classList.remove('show'); }
}

// ============================================================
// 撮影
// ============================================================
function capture(){
  var v=document.getElementById('video');
  if(!v.videoWidth){toast('カメラ未起動');return;}
  // フラッシュ演出
  var fl=document.getElementById('shot-flash');
  fl.classList.add('active');
  setTimeout(function(){fl.classList.remove('active');},80);
  var c=document.getElementById('cv-snap');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  var src=c.toDataURL('image/jpeg',0.92);
  var tiltState=qualTilt(currentTilt), blurState=qualBlur(currentBlur), expState=qualExp(currentExp);
  var rec={
    id:'p_'+Date.now(), src:src,
    kubun:'着手前', title:'', location:'', koushu:'', memo:'',
    _capturedAt:new Date().toLocaleString('ja-JP'),
    _quality:{
      tilt:currentTilt, tiltState:tiltState,
      blur:Math.round(currentBlur), blurState:blurState,
      exp:Math.round(currentExp), expState:expState
    }
  };
  var bads=[];
  if(tiltState==='bad')bads.push('傾き');
  if(blurState==='bad')bads.push('ピント');
  if(expState==='bad')bads.push('明るさ');
  if(bads.length){
    if(!confirm('⚠ 品質に問題：'+bads.join('・')+'\n保存しますか？（キャンセルで撮り直し）'))return;
  }
  dbPut(rec,function(){
    photos.unshift(rec);
    updateThumb();
    toast('撮影しました（'+photos.length+'枚）');
  });
}

// ============================================================
// ギャラリー
// ============================================================
function updateThumb(){
  var n=photos.length;
  var badge=document.getElementById('gthumb-badge');
  var icon=document.getElementById('gthumb-icon');
  var gt=document.getElementById('gthumb');
  if(n>0){
    badge.textContent=n; badge.style.display='block';
    // 最新写真をサムネに
    gt.innerHTML='<img src="'+photos[0].src+'"><span class="badge" id="gthumb-badge">'+n+'</span>';
  } else {
    icon.style.display='block'; badge.style.display='none';
  }
}
function openGallery(){renderGallery();document.getElementById('gallery-view').classList.add('open');}
function closeGallery(){document.getElementById('gallery-view').classList.remove('open');}
function renderGallery(){
  dbAll(function(rows){
    photos=rows.sort(function(a,b){return b.id.localeCompare(a.id);});
    updateThumb();
    var grid=document.getElementById('gv-grid');
    var empty=document.getElementById('gv-empty');
    if(!photos.length){grid.innerHTML='';empty.style.display='block';return;}
    empty.style.display='none';
    grid.innerHTML=photos.map(function(p){
      var q=p._quality||{}, chips='';
      if(q.tiltState) chips+='<span class="qchip '+q.tiltState+'">傾'+(q.tilt||0).toFixed(1)+'°</span>';
      if(q.blurState) chips+='<span class="qchip '+q.blurState+'">ピ</span>';
      if(q.expState)  chips+='<span class="qchip '+q.expState+'">明</span>';
      return '<div class="gv-card">'
        +'<img class="gv-card-img" src="'+p.src+'" onclick="openLB(\''+p.id+'\')">'
        +'<div class="gv-card-body">'
        +'<div class="gv-card-meta">'+(p._capturedAt||'')+'</div>'
        +'<div class="gv-q">'+chips+'</div>'
        +'<div class="gv-btns">'
        +'<button class="gbtn dl" onclick="dlPhoto(\''+p.id+'\')">DL</button>'
        +'<button class="gbtn del" onclick="delPhoto(\''+p.id+'\')">削除</button>'
        +'</div></div></div>';
    }).join('');
  });
}
function openLB(id){var p=photos.find(function(x){return x.id===id;});if(!p)return;document.getElementById('lb-img').src=p.src;document.getElementById('lb').classList.add('open');}
function closeLB(){document.getElementById('lb').classList.remove('open');}
function dlPhoto(id){var p=photos.find(function(x){return x.id===id;});if(!p)return;var a=document.createElement('a');a.href=p.src;a.download='kouji_'+id+'.jpg';a.click();}
function delPhoto(id){if(!confirm('削除しますか？'))return;dbDel(id,function(){renderGallery();toast('削除しました');});}

// ============================================================
// Service Worker（PWA）
// ============================================================
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(err){console.log('SW登録失敗:',err);});
  });
}

// ============================================================
// 起動
// ============================================================
openDB(function(){
  dbAll(function(rows){
    photos=rows.sort(function(a,b){return b.id.localeCompare(a.id);});
    updateThumb();
  });
});
</script>
